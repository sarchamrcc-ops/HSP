function toOff(raw) {
  if (!raw) return null;
  const s = String(raw).trim();
  const m = s.match(/^(\d{1,2})-(\d{1,2})-(\d{2,4})$/);
  if (!m) return null;
  let [, d, mo, yr] = m;
  if (yr.length === 2) yr = "20" + yr;
  const dt = new Date(`${yr}-${mo.padStart(2,"0")}-${d.padStart(2,"0")}`);
  return isNaN(dt) ? null : Math.round((dt - TIMELINE_START) / 86400000);
}

function getResponsibles() {
  const seen = new Set();
  RAW.forEach(t => { if (t.responsible) seen.add(t.responsible); });
  return ["All", ...Array.from(seen).sort()];
}

function dispDate(raw) {
  const m = String(raw || "").match(/^(\d{1,2})-(\d{1,2})-(\d{2,4})$/);
  if (!m) return raw || "";
  const mos = ["","Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${m[1]} ${mos[parseInt(m[2])]}`;
}

// ═══════════════════════════════════════════════════════════════════════════
//  UPLOAD & COMPARE FEATURE
// ═══════════════════════════════════════════════════════════════════════════
let pendingDiff = null;

function openFilePicker() {
  const inp = document.createElement("input");
  inp.type    = "file";
  inp.accept  = ".xlsx,.xls";
  inp.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const wb   = XLSX.read(ev.target.result, { type:"array" });
        const ws   = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval:"" });
        runDiff(rows);
      } catch (err) {
        alert("Could not parse Excel file:\n" + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  };
  inp.click();
}

function normalizeUploadRow(r) {
  // Accept flexible column names from Excel
  const g = (keys) => {
    for (const k of keys) { if (r[k] !== undefined && r[k] !== "") return String(r[k]).trim(); }
    return "";
  };
  return {
    id:          parseInt(g(["id","ID","Id","رقم"]) || "0"),
    area:        g(["area","Area","AREA","section","Section","القسم","المنطقة"]),
    task:        g(["task","Task","TASK","desc","Desc","description","Description","المهمة"]),
    ar:          g(["ar","AR","arabic","Arabic","وصف عربي"]),
    status:      g(["status","Status","STATUS","الحالة"]),
    responsible: g(["responsible","Responsible","RESPONSIBLE","person","Person","المسؤول"]),
    date:        g(["date","Date","DATE","due_date","DueDate","التاريخ"]),
    notes:       g(["notes","Notes","NOTES","ملاحظات"]),
  };
}

function runDiff(uploadedRows) {
  const uploaded    = uploadedRows.map(normalizeUploadRow).filter(r => r.id > 0);
  const uploadedMap = new Map(uploaded.map(r => [r.id, r]));
  const currentMap  = new Map(RAW.map(r => [r.id, r]));

  const added    = [];
  const modified = [];
  const flagged  = [];

  for (const [id, uRow] of uploadedMap) {
    const cur = currentMap.get(id);
    if (!cur) {
      added.push(uRow);
    } else {
      const changes = [];
      for (const f of ["area","task","ar","status","responsible","date","notes"]) {
        const was = String(cur[f] || "").trim();
        const now = String(uRow[f] || "").trim();
        if (was !== now) changes.push({ field:f, from:cur[f], to:uRow[f] });
      }
      if (changes.length) modified.push({ id, task:cur.task, changes });
    }
  }

  for (const [id, cur] of currentMap) {
    if (!uploadedMap.has(id)) flagged.push(cur);
  }

  pendingDiff = { added, modified, flagged, uploaded };
  showDiffModal();
}

// ─── Diff Modal ────────────────────────────────────────────────────────────

              <span style="color:#15803d;font-weight:500">${c.to||"(empty)"}</span>
            </div>`).join("")}
        </div>`).join("")}
    </div>`;

  const flagHTML = flagged.length === 0 ? "" : `
    <div class="diff-block">
      <div class="diff-hdr" style="background:#fee2e2;color:#b91c1c">🔴 FLAGGED &nbsp;— ${flagged.length} ITEM${flagged.length>1?"S":""} NOT IN UPLOAD (KEPT — NEVER DELETED)</div>
      ${flagged.map(r => `
        <div class="diff-row" style="background:#fff5f5;border:1px solid #fecaca;align-items:center">
          <span style="font-size:10px;color:#9a8a70;min-width:32px">#${r.id}</span>
          <div style="flex:1;overflow:hidden">
            <div style="font-size:11.5px;font-weight:500;color:#1c1712">${r.task}</div>
            <div style="font-size:9.5px;color:#6b5f4a;margin-top:3px">${r.area} &nbsp;·&nbsp; ${r.status}</div>
          </div>
          ${pill("KEPT — NOT DELETED","#fee2e2","#b91c1c")}
        </div>`).join("")}
    </div>`;

  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  overlay.id = "diffModal";
  overlay.innerHTML = `
    <div class="modal-box">

      <!-- Modal Header -->
      <div class="modal-header">
        <div>
          <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:22px;font-weight:600;color:#e8c870;letter-spacing:0.08em">UPLOAD COMPARISON REPORT</div>
          <div style="font-size:9.5px;color:#8a7a5a;letter-spacing:0.14em;margin-top:4px">VILLA 2 &nbsp;·&nbsp; PUNCH LIST TRACKER &nbsp;·&nbsp; RCC DESIGN &amp; SUPERVISION</div>
        </div>
        <button class="btn-close" onclick="closeDiffModal()">✕</button>

          <div style="font-family:'Cormorant Garamond',serif;font-size:24px;color:#e8c870">${modified.length}</div>
        </div>
        <div style="flex:1;padding:10px 18px">
          <div style="font-size:8.5px;letter-spacing:0.14em;color:#6a5a3a;margin-bottom:3px">FLAGGED (NOT DELETED)</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:24px;color:#c0392b">${flagged.length}</div>
        </div>
      </div>

      <!-- Diff body -->
      <div class="modal-body">
        ${noChanges
          ? `<div style="text-align:center;padding:50px 20px;color:#6b5f4a">
               <div style="font-size:32px;margin-bottom:12px">✅</div>
               <div style="font-family:'Cormorant Garamond',serif;font-size:20px;color:#1c1712;margin-bottom:6px">No Differences Detected</div>
               <div style="font-size:11px;color:#a09080">The uploaded file matches the current dashboard data exactly.</div>
             </div>`
          : addedHTML + modHTML + flagHTML}
      </div>

      <!-- Footer actions -->
      <div class="modal-footer">
        <button class="btn-outline" onclick="closeDiffModal()">CANCEL</button>
        ${!noChanges ? `<button class="btn-outline" onclick="exportReport()">EXPORT REPORT</button>` : ""}
        ${(added.length > 0 || modified.length > 0)
          ? `<button class="btn-gold" onclick="applyChanges()">APPLY CHANGES</button>`
          : ""}

    </div>`;

  // Close on overlay click
  overlay.addEventListener("click", e => { if (e.target === overlay) closeDiffModal(); });
  document.body.appendChild(overlay);
}

function closeDiffModal() {
  const m = document.getElementById("diffModal");
  if (m) { m.style.opacity = "0"; m.style.transition = "opacity 0.15s"; setTimeout(() => m.remove(), 150); }
}

// ─── Apply Changes — live re-render, no page reload ────────────────────────
function applyChanges() {
  if (!pendingDiff) return;
  const { added, modified } = pendingDiff;
  const map = new Map(RAW.map(r => [r.id, r]));
  for (const m of modified) {
    const cur = map.get(m.id);
    if (cur) { for (const c of m.changes) cur[c.field] = c.to; }
  }
  for (const a of added) {
    if (!map.has(a.id)) RAW.push(a);
  }
  pendingDiff = null;
  closeDiffModal();
  render();
}

function render() {
  const responsibles = getResponsibles();

  // KPI counts always from full RAW (not filtered)
  const total     = RAW.length;
  const doneList  = RAW.filter(t => getCfg(t.status).group === "done");
  const actList   = RAW.filter(t => getCfg(t.status).group === "active");
  const pendList  = RAW.filter(t => getCfg(t.status).group === "pending");
  const pct       = total ? Math.round(doneList.length / total * 100) : 0;

  const areaStats = Object.keys(AREA_COLORS).map(a => {
    const g = RAW.filter(t => t.area === a);
    const d = g.filter(t => getCfg(t.status).group === "done").length;
    return { a, total:g.length, done:d, pct:g.length ? Math.round(d/g.length*100) : 0, color:AREA_COLORS[a] };
  });

  // Apply stacked filters
  let filtered = RAW;
  if (activeSection     !== "All") filtered = filtered.filter(t => t.area        === activeSection);
  if (activeResponsible !== "All") filtered = filtered.filter(t => t.responsible === activeResponsible);

  const withDate = [...filtered].filter(t => t.date).sort((a,b) => toOff(a.date) - toOff(b.date));
  const noDate   = filtered.filter(t => !t.date);
  const LW       = 310;

  // ── Section filter tabs (gold) ───────────────────────────────────────────
  const tabsHTML = SECTIONS.map(s => {
    const active = s === activeSection;
    const color  = s === "All" ? "#b8953a" : AREA_COLORS[s] || "#b8953a";
    return `<button class="stab" data-type="sec" data-val="${s}" style="
      padding:5px 16px;font-size:10px;letter-spacing:0.1em;font-weight:500;
      background:${active ? color : "#fff"};color:${active ? "#fff" : "#8a7a60"};
      border:1px solid ${active ? color : "#ddd5c8"};border-radius:20px;">${s.toUpperCase()}</button>`;
  }).join("");

  // ── Responsible filter tabs (teal) ───────────────────────────────────────
  const respHTML = responsibles.map(r => {
    const active = r === activeResponsible;
    return `<button class="stab" data-type="resp" data-val="${r}" style="
      padding:5px 16px;font-size:10px;letter-spacing:0.1em;font-weight:500;
      background:${active ? "#0e7490" : "#fff"};color:${active ? "#fff" : "#0e7490"};

  // ── Area progress bars ───────────────────────────────────────────────────
  const spHTML = areaStats.map(({a,total:t,done:d,pct:p,color}) => `

    </div>`).join("");

  // ── Month / week header ──────────────────────────────────────────────────
  const monthH = MONTHS.map(({label,start,days}) =>
    `<div style="position:absolute;left:${start/DAYS*100}%;width:${days/DAYS*100}%;height:100%;border-left:1px solid #ddd5c8;display:flex;align-items:center;padding-left:12px;font-size:9.5px;letter-spacing:0.14em;color:#b8953a;font-weight:600">${label}</div>`

        </div>

    <div style="background:linear-gradient(135deg,#1c1712 0%,#2a2016 100%);padding:22px 32px 18px;flex-shrink:0">

          <div style="font-size:11px;color:#8a7a5a;letter-spacing:0.14em;margin-top:5px">

      <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
        ${legendHTML}
        <div style="display:flex;align-items:center;gap:5px;margin-left:6px;padding-left:12px;border-left:1px solid #ede8df;white-space:nowrap">
          <div style="width:2px;height:14px;background:#c0392b;opacity:0.65;border-radius:1px"></div>
          <span style="font-size:9.5px;color:#8a7a60">Today (${TODAY_LABEL})</span>
        </div>
        ${(activeSection !== "All" || activeResponsible !== "All") ? `
        <div style="margin-left:auto;font-size:9.5px;color:#6b5f4a;background:#fef9c3;border:1px solid #fde68a;border-radius:10px;padding:2px 10px;white-space:nowrap">
          Showing ${filtered.length} of ${total} items
        </div>` : ""}
      </div>
    </div>

    <!-- GANTT CHART -->
    <div style="overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 430px)">
      <div style="min-width:880px">

        <!-- Sticky column header -->
        <div style="display:flex;position:sticky;top:0;z-index:10;background:#f0ebe2;border-bottom:2px solid #ddd5c8;height:46px;box-shadow:0 2px 6px rgba(0,0,0,0.06)">
          <div style="width:${LW}px;min-width:${LW}px;padding:0 16px;display:flex;align-items:center;font-size:9px;letter-spacing:0.16em;color:#b8b0a0;border-right:1px solid #ddd5c8;font-weight:500">
            TASK &nbsp;&amp;&nbsp; NOTES
          </div>
          <div style="flex:1;position:relative">
            ${monthH}${weekTicks}
            <!-- Dynamic TODAY marker in header -->
            <div style="position:absolute;left:${todayPct}%;top:0;bottom:0;width:2px;background:rgba(192,57,43,0.6);z-index:5">
              <div style="position:absolute;top:5px;left:4px;font-size:8.5px;color:#c0392b;letter-spacing:0.1em;font-weight:600;white-space:nowrap">${TODAY_LABEL}</div>
            </div>
          </div>
        </div>

        <!-- Dated task rows -->
        ${rowsHTML}

        <!-- DATE TBD zone -->
        ${noDateHTML}

      </div>
    </div>

    <!-- FOOTER -->
    <div style="padding:12px 32px;background:#fff;border-top:1px solid #ede8df;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:9px;color:#c8bfae;letter-spacing:0.12em">RCC — DESIGN &amp; SUPERVISION DIVISION</span>
      <span style="font-size:9px;color:#c8bfae;letter-spacing:0.12em">VILLA 2 PUNCH LIST TRACKER &nbsp;·&nbsp; R04 &nbsp;·&nbsp; CONFIDENTIAL</span>
      <span style="font-size:9px;color:#c8bfae;letter-spacing:0.08em;direction:rtl;font-family:Arial,sans-serif">شعبة التصميم والإشراف — VILLA 2</span>
    </div>

  </div>`;

  // ── Wire up event listeners after DOM update ─────────────────────────────
  document.querySelectorAll(".stab").forEach(btn => {
    btn.addEventListener("click", () => {
      if (btn.dataset.type === "sec")  activeSection     = btn.dataset.val;
      else                             activeResponsible = btn.dataset.val;
      render();
    });
  });

  document.getElementById("uploadBtn").addEventListener("click", openFilePicker);
}

// ── Boot ──────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
