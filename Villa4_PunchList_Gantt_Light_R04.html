<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Jost',system-ui,sans-serif;background:#f7f4ef;color:#1a1612;min-height:100vh}
  ::-webkit-scrollbar{width:5px;height:5px}
  ::-webkit-scrollbar-track{background:#ece8e0}
  ::-webkit-scrollbar-thumb{background:#b8893a66;border-radius:3px}
  .tr:hover{background:rgba(184,137,58,0.06)!important}
  .stab{cursor:pointer;transition:all 0.18s;font-family:'Jost',sans-serif}
  .stab:hover{opacity:0.75}
  .tooltip{display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);display:flex;gap:6px;align-items:center;z-index:10}
  .tr:hover .tooltip{display:flex}

  /* ── UPLOAD BUTTON ── */
  .upload-btn{
    cursor:pointer;font-family:'Jost',sans-serif;font-size:9.5px;letter-spacing:0.13em;
    font-weight:500;padding:7px 15px;border:1px solid #b8893a;border-radius:20px;
    background:transparent;color:#b8893a;transition:all 0.2s;display:inline-flex;
    align-items:center;gap:7px;
  }
  .upload-btn:hover{background:#b8893a14;box-shadow:0 0 0 3px #b8893a18}
  .upload-btn svg{flex-shrink:0}

  /* ── DIFF MODAL ── */
  #diffBackdrop{
    display:none;position:fixed;inset:0;background:rgba(20,16,12,0.58);
    z-index:1000;align-items:center;justify-content:center;
    backdrop-filter:blur(3px);
  }
  #diffBackdrop.active{display:flex}
  #diffModal{
    background:#fff;border-radius:14px;border-top:4px solid #b8893a;
    width:min(860px,95vw);max-height:90vh;display:flex;flex-direction:column;
    box-shadow:0 24px 70px rgba(0,0,0,0.28);overflow:hidden;
    animation:modalIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes modalIn{from{opacity:0;transform:scale(0.94) translateY(10px)}to{opacity:1;transform:none}}
  .diff-header{padding:20px 26px 16px;border-bottom:1px solid #ede8e0;flex-shrink:0}
  .diff-body{overflow-y:auto;flex:1}
  .diff-footer{
    padding:14px 26px;border-top:1px solid #ede8e0;
    display:flex;justify-content:flex-end;gap:10px;
    flex-shrink:0;background:#faf8f4;
  }
  .diff-sec-hdr{
    padding:8px 22px;font-size:9px;letter-spacing:0.18em;font-weight:600;
    border-bottom:1px solid #ede8e0;border-top:1px solid #ede8e0;
    position:sticky;top:0;z-index:2;
  }
  .diff-row{
    padding:11px 22px;border-bottom:1px solid #f3efe8;
    display:flex;gap:13px;align-items:flex-start;
  }
  .diff-row:last-child{border-bottom:none}
  .diff-badge{
    width:64px;flex-shrink:0;font-size:8px;letter-spacing:0.13em;
    font-weight:700;padding:3px 0;border-radius:10px;text-align:center;margin-top:2px;
  }
  .field-change{
    display:flex;gap:7px;align-items:flex-start;font-size:9.5px;
    margin-top:4px;flex-wrap:wrap;
  }
  .fchange-label{font-size:8.5px;color:#a0907a;width:88px;flex-shrink:0;padding-top:1px;letter-spacing:0.06em}
  .from-val{color:#b0a090;text-decoration:line-through;word-break:break-word}
  .to-val{color:#1a1612;font-weight:500;word-break:break-word}
  .chg-arrow{color:#b8893a;font-size:12px;flex-shrink:0;margin-top:-1px}
  .modal-close-btn{
    background:none;border:none;cursor:pointer;color:#9a8a70;
    font-size:17px;padding:4px 8px;border-radius:6px;line-height:1;
    transition:background 0.15s;
  }
  .modal-close-btn:hover{background:#f0ece4}
  .modal-action-btn{
    font-family:'Jost',sans-serif;font-size:9.5px;letter-spacing:0.13em;
    font-weight:500;padding:9px 22px;border-radius:20px;cursor:pointer;
    transition:all 0.18s;
  }
  .modal-action-btn.cancel{
    border:1px solid #d4ccc0;background:transparent;color:#6a5f4a;
  }
  .modal-action-btn.cancel:hover{background:#f0ece4}
  .modal-action-btn.apply{
    border:1px solid #b8893a;background:#b8893a;color:#fff;
  }
  .modal-action-btn.apply:hover{background:#a07830}
  .modal-action-btn.export{
    border:1px solid #4a7c6a;background:transparent;color:#4a7c6a;
  }
  .modal-action-btn.export:hover{background:#4a7c6a12}
  .modal-action-btn:disabled{opacity:0.38;cursor:not-allowed;pointer-events:none}

  /* ── TOAST ── */
  .vt-toast{
    position:fixed;bottom:24px;right:24px;background:#1a1612;color:#fff;
    padding:13px 22px;border-radius:10px;border-left:3px solid #b8893a;
    font-family:'Jost',sans-serif;font-size:11px;letter-spacing:0.07em;
    z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,0.28);
    animation:toastIn 0.3s ease;
  }
  @keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
</style>

<!-- ─── STATIC: hidden file input ─────────────────────────── -->
<input type="file" id="uploadInput" accept=".xlsx,.xls" style="display:none"

<!-- ─── DIFF MODAL OVERLAY ────────────────────────────────── -->
<div id="diffBackdrop">

        <div>

            Update Review
          </div>
          <div style="font-size:9.5px;color:#9a8a70;letter-spacing:0.1em;margin-top:3px">
            Item-by-item comparison with uploaded Excel file
          </div>
        </div>
        <button class="modal-close-btn" onclick="closeDiffModal()">✕</button>
      </div>
      <div id="diffSummary" style="display:flex;gap:9px;margin-top:14px;flex-wrap:wrap"></div>
    </div>

    <div class="diff-body" id="diffBody"></div>

    <div class="diff-footer">
      <button class="modal-action-btn cancel" onclick="closeDiffModal()">CANCEL</button>
      <div style="margin-left:auto;display:flex;gap:10px;align-items:center">
        <button class="modal-action-btn export" id="exportBtn" onclick="exportDiffReport()">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
            style="display:inline;vertical-align:middle;margin-right:6px">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>EXPORT REPORT
        </button>
        <button class="modal-action-btn apply" id="applyBtn" onclick="applyDiff()">APPLY CHANGES</button>
      </div>
    </div>

  </div>
</div>

const START = new Date("2026-04-01");

// Dynamic today — always reflects the real current date
const _TODAY      = new Date(); _TODAY.setHours(0,0,0,0);
const TODAY_OFF   = Math.min(DAYS-1, Math.max(0, Math.round((_TODAY - START)/86400000)));

const TODAY_LABEL = `${MNAMES[_TODAY.getMonth()]} ${_TODAY.getDate()}`;

const SECTIONS = ["All","Backyard","External Front","First Floor","Ground Floor","Basement","Second Floor","General"];

function toOff(d){ if(!d) return null; const dt=new Date(d); return isNaN(dt)?null:Math.round((dt-START)/86400000); }

let activeSection     = "All";
let activeResponsible = "All";

  const total    = RAW.length;
  const done     = RAW.filter(t=>t.status==="Done").length;
  const canceled = RAW.filter(t=>t.status==="Canceled").length;
  const pending  = total - done - canceled;
  const pct      = Math.round(done/total*100);

  const sStats = Object.keys(SC).map(s=>{
    const g=RAW.filter(t=>t.section===s);
    const d=g.filter(t=>t.status==="Done").length;
    return {s,total:g.length,done:d,pct:Math.round(d/g.length*100),color:SC[s]};
  });

  const LW = 295;

  // TABS — Section
  const tabsHTML = SECTIONS.map(s=>{
    const active = s===activeSection;
    const color  = s==="All" ? "#b8893a" : SC[s]||"#b8893a";

      padding:5px 16px;font-size:10px;letter-spacing:0.1em;font-weight:500;
      background:${active?color+"18":"transparent"};
      color:${active?color:"#8a7a6a"};

      padding:4px 13px;font-size:9.5px;letter-spacing:0.09em;font-weight:500;

// ─── UPLOAD & COMPARE ─────────────────────────────────────────────────────────

let _pendingDiff   = null;
let _pendingNewRaw = null;

/**
 * Excel column layout (0-indexed):
 *  0  → #            → id
 *  1  → ID           → ref
 *  2  → Section      → section
 *  3  → Location/Area (Arabic label – informational only, not diffed)
 *  4  → Description  → desc
 *  5  → الوصف        → ar
 *  6  → Status       → status  (null → "Pending")
 *  7  → Responsible  → responsible
 *  8  → Target Date  → date    (Date object → "YYYY-MM-DD" | null)
 *  9  → Remarks      (ignored)
 */
function handleUpload(input) {
  const file = input.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    input.value = "";
    try {
      const data     = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, {type:"array", cellDates:true});
      const ws       = workbook.Sheets[workbook.SheetNames[0]];
      const rows     = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});

      if (!rows || rows.length < 2) { showUploadError("No data rows found."); return; }

      // rows[0] = header, rows[1..n] = data
      const newRaw = rows.slice(1).map(row => {
        const id = row[0];
        if (id == null || id === "") return null;   // skip blank rows

        // Date: SheetJS gives a JS Date when cellDates:true
        let date = null;
        const dateVal = row[8];
        if (dateVal instanceof Date && !isNaN(dateVal)) {
          const y = dateVal.getFullYear();
          const m = String(dateVal.getMonth()+1).padStart(2,"0");
          const d = String(dateVal.getDate()).padStart(2,"0");
          date = `${y}-${m}-${d}`;
        }

        // Status: null/empty in Excel → "Pending"
        const rawStatus = row[6];
        const status = rawStatus === "Done"     ? "Done"
                     : rawStatus === "Canceled" ? "Canceled"
                     : "Pending";

        return {
          id:          Number(id),
          ref:         row[1] != null ? Number(row[1]) : null,
          section:     (row[2] || "").trim(),
          area:        (row[3] || "").trim(),   // Arabic label; kept for new items
          desc:        (row[4] || "").trim(),
          ar:          (row[5] || "").trim(),
          status,
          responsible: (row[7] || "—").trim(),
          date,
        };
      }).filter(Boolean);

      if (!newRaw.length) { showUploadError("Could not parse any rows."); return; }

      _pendingDiff   = compareLists(RAW, newRaw);
      _pendingNewRaw = newRaw;
      openDiffModal(_pendingDiff);

    } catch(err) {
      console.error(err);
      showUploadError("File could not be read. Make sure it is a valid .xlsx file.");
    }
  };
  reader.readAsArrayBuffer(file);
}

/**
 * Compares two RAW arrays item-by-item (matched by numeric id = '#' column).
 * Tracks: status, responsible, date, desc, ar.
 * Skips: area (Arabic in Excel vs English in dashboard).
 * Returns { added, modified, unchanged, removed }.
 */
function compareLists(current, incoming) {
  const TRACK = ["status", "responsible", "date", "desc", "ar"];

  const curMap = new Map(current.map(t => [t.id, t]));
  const incMap = new Map(incoming.map(t => [t.id, t]));

  const added=[], modified=[], unchanged=[], removed=[];

  for (const item of incoming) {
    const cur = curMap.get(item.id);
    if (!cur) { added.push(item); continue; }

    const changes = {};
    let changed = false;
    for (const f of TRACK) {
      const a = cur[f]  == null ? "" : String(cur[f]).trim();
      const b = item[f] == null ? "" : String(item[f]).trim();
      if (a !== b) { changes[f] = {from: cur[f], to: item[f]}; changed = true; }
    }
    if (changed) modified.push({item, changes, old: cur});
    else         unchanged.push(item);
  }

  for (const item of current) {
    if (!incMap.has(item.id)) removed.push(item);
  }

  return {added, modified, unchanged, removed};
}

/**
 * Builds and opens the diff modal with full review UI.
 */
function openDiffModal(diff) {
  const {added, modified, unchanged, removed} = diff;
  const totalChanges = added.length + modified.length;

  // ── Summary chips ─────────────────────────────────────────
  const chips = [
    {label:"NEW",          count:added.length,     color:"#16a34a", bg:"#dcfce7"},
    {label:"MODIFIED",     count:modified.length,  color:"#d97706", bg:"#fef3c7"},
    {label:"UNCHANGED",    count:unchanged.length, color:"#6b7280", bg:"#f3f4f6"},
    ...(removed.length ? [{label:"ABSENT",count:removed.length,color:"#dc2626",bg:"#fee2e2"}]:[]),
  ];

  document.getElementById("diffSummary").innerHTML = chips.map(({label,count,color,bg})=>`
    <div style="display:inline-flex;align-items:center;gap:7px;padding:6px 16px;
      border-radius:20px;background:${bg};border:1px solid ${color}44">
      <span style="font-family:'Cormorant Garamond',Georgia,serif;font-size:20px;
        font-weight:600;color:${color};line-height:1">${count}</span>
      <span style="font-size:8.5px;letter-spacing:0.15em;color:${color};
        font-weight:600">${label}</span>
    </div>`).join("");

  // ── Apply button state ────────────────────────────────────
  const applyBtn = document.getElementById("applyBtn");
  if (totalChanges === 0) {
    applyBtn.disabled = true;
    applyBtn.textContent = "NO CHANGES TO APPLY";
  } else {
    applyBtn.disabled = false;
    applyBtn.textContent = `APPLY ${totalChanges} CHANGE${totalChanges!==1?"S":""}`;
  }

  // ── Body HTML ─────────────────────────────────────────────
  const FIELD_LABELS = {
    status:"Status", responsible:"Responsible", date:"Due Date",
    desc:"Description (EN)", ar:"Description (AR)",
    section:"Section", area:"Area", ref:"Ref #"
  };

  let body = "";

  // ── No changes at all ─────────────────────────────────────
  if (totalChanges === 0 && removed.length === 0) {
    body = `

    if (removed.length) {
      body += `
        <div class="diff-sec-hdr" style="background:#fff1f2;color:#dc2626">
          ⚠ &nbsp;${removed.length} ITEM${removed.length!==1?"S":""} NOT IN UPLOADED FILE

function closeDiffModal() {
  document.getElementById("diffBackdrop").classList.remove("active");
  _pendingDiff   = null;
  _pendingNewRaw = null;
}

/**
 * Applies the pending diff: updates modified items in place, appends new items.
 */
function applyDiff() {
  if (!_pendingDiff) return;
  const {added, modified} = _pendingDiff;

  // 1. Update modified items
  const idxMap = new Map(RAW.map((t,i) => [t.id, i]));
  for (const {item} of modified) {
    const idx = idxMap.get(item.id);
    if (idx !== undefined) Object.assign(RAW[idx], item);
  }

  // 2. Add new items (guarantee unique id)
  const maxId = Math.max(...RAW.map(t => t.id), 0);
  let nextId  = maxId + 1;
  const existingIds = new Set(RAW.map(t => t.id));
  for (const item of added) {
    const safeId = existingIds.has(item.id) ? nextId++ : item.id;
    existingIds.add(safeId);
    RAW.push({...item, id:safeId});
  }

  const addedCount    = added.length;
  const modifiedCount = modified.length;

  closeDiffModal();
  render();
  showToast(`${addedCount+modifiedCount} change${addedCount+modifiedCount!==1?"s":""} applied — ${addedCount} added · ${modifiedCount} updated`);
}

/** Small bottom-right toast notification */
function showToast(msg) {
  const t = document.createElement("div");
  t.className = "vt-toast";
  t.innerHTML = `<span style="color:#b8893a;margin-right:8px">✓</span>${msg}`;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.transition="opacity 0.4s"; t.style.opacity="0"; setTimeout(()=>t.remove(),420); }, 3600);
}

/** Error toast when file cannot be parsed */
function showUploadError(msg) {
  const t = document.createElement("div");
  t.className = "vt-toast";
  t.style.borderLeftColor = "#dc2626";
  t.innerHTML = `<span style="color:#dc2626;margin-right:8px">✕</span>${msg || "Could not read the file — please upload a valid Villa 4 Excel tracking file (.xlsx)."}`;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.transition="opacity 0.4s"; t.style.opacity="0"; setTimeout(()=>t.remove(),420); }, 4000);
}

// Close modal on backdrop click
document.getElementById("diffBackdrop").addEventListener("click", e => {
  if (e.target === document.getElementById("diffBackdrop")) closeDiffModal();
});
